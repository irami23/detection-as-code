name: detection-ci
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint rules (Sigma validators + best practices)
        run: sigma check rules/ --validation-config validation-config.yml
      - name: Test (metadata governance + conversion regression)
        run: pytest -q